<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Redirigiendo a WhatsApp...</title>
  <!-- ✅ Meta Pixel -->

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '578319731426704');
    fbq('track', 'PageView');

  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=578319731426704&ev=PageView&noscript=1"/></noscript>
  <!-- End Meta Pixel -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      padding: 20px;
    }
    .container {
      text-align: center; max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 32px; border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .logo { width: 72px; height: 72px; margin: 0 auto 24px; }
    h1 { font-size: 24px; color: #075E54; margin-bottom: 12px; font-weight: 600; }
    p { font-size: 15px; color: #666; margin-bottom: 24px; }
    .loader {
      border: 4px solid #e0e0e0; border-top: 4px solid #25D366;
      border-radius: 50%; width: 42px; height: 42px;
      animation: spin 1s linear infinite; margin: 0 auto 16px;
    }
    .status { font-size: 13px; color: #777; margin-top: 4px; }
    .fallback-link { display: none; margin-top: 24px; }
    .fallback-link a {
      display: inline-block; background: #25D366; color: #fff;
      padding: 12px 24px; border-radius: 999px;
      text-decoration: none; font-weight: 600; font-size: 14px;
    }
    .fallback-link a:hover { background: #128C7E; }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path fill="#25D366" d="M16 0c-8.837 0-16 7.163-16 16 0 2.825 0.737 5.607 2.137 8.048l-2.137 7.952 7.933-2.127c2.42 1.37 5.173 2.127 8.067 2.127 8.837 0 16-7.163 16-16s-7.163-16-16-16zM16 29.467c-2.482 0-4.908-0.646-7.07-1.87l-0.507-0.292-5.247 1.408 1.407-5.24-0.292-0.508c-1.235-2.144-1.891-4.585-1.891-7.032 0-7.589 6.163-13.755 13.6-13.755s13.6 6.165 13.6 13.755c0 7.589-6.163 13.755-13.6 13.755z"/>
      <path fill="#25D366" d="M23.307 19.183c-0.303-0.15-1.793-0.883-2.070-0.983-0.277-0.1-0.478-0.15-0.68 0.15s-0.781 0.983-0.958 1.185c-0.177 0.201-0.353 0.226-0.656 0.076s-1.278-0.471-2.434-1.502c-0.899-0.803-1.506-1.795-1.683-2.098s-0.019-0.461 0.132-0.611c0.135-0.135 0.303-0.353 0.454-0.529s0.201-0.303 0.303-0.504c0.1-0.201 0.050-0.378-0.025-0.529s-0.68-1.636-0.932-2.241c-0.245-0.587-0.494-0.508-0.68-0.517-0.176-0.008-0.378-0.010-0.58-0.010s-0.529 0.075-0.806 0.378c-0.277 0.303-1.058 1.034-1.058 2.522s1.083 2.925 1.234 3.127c0.151 0.201 2.13 3.251 5.158 4.558 0.72 0.31 1.283 0.495 1.721 0.634 0.724 0.230 1.383 0.198 1.904 0.120 0.581-0.087 1.793-0.733 2.046-1.441s0.253-1.315 0.177-1.441c-0.076-0.126-0.277-0.201-0.58-0.351z"/>
    </svg>
    <h1>Conectando con WhatsApp</h1>
    <p>Serás redirigido en un momento...</p>
    <div class="loader"></div>
    <div class="status" id="status">Preparando conexión...</div>
    <div class="fallback-link" id="fallback">
      <a href="#" id="manualLink">Abrir WhatsApp manualmente</a>
    </div>
  </div>
  <script>
    const CONFIG = {
        whatsappNumber: '5215541707545',
        scriptURL: 'https://script.google.com/macros/s/AKfycbxHc2g5U1eOzT5UcYnJeTUFqAIZHh6EuCtRCOvAfzhNvX-aCt5yN-jb446xZ6R8CyU/exec',
        mensaje: "Hola! Me interesa recibir INFO",
        redirectDelay: /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? 450 : 700,
        debug: false
    };

    const urlParams    = new URLSearchParams(window.location.search);
    const statusEl     = document.getElementById('status');
    const fallbackEl   = document.getElementById('fallback');
    const manualLinkEl = document.getElementById('manualLink');

    function updateStatus(message, isError = false) {
        statusEl.textContent = message;
        if (isError) statusEl.style.color = '#d32f2f';
    }

    function getFbpFromCookie() {
        const cookie = document.cookie.split(';').find(c => c.trim().startsWith('_fbp='));
        return cookie ? cookie.trim().split('=').slice(1).join('=') : null;
    }

    function getFbcFromCookie() {
        const cookie = document.cookie.split(';').find(c => c.trim().startsWith('_fbc='));
        return cookie ? cookie.trim().split('=').slice(1).join('=') : null;
    }

    const capturedData = {
        fbclid:      urlParams.get('fbclid'),
        campaign_id: urlParams.get('campaign_id'),
        adset_id:    urlParams.get('adset_id'),
        ad_id:       urlParams.get('ad_id'),
        utm_source:  urlParams.get('utm_source'),
        utm_medium:  urlParams.get('utm_medium'),
        utm_campaign:urlParams.get('utm_campaign'),
        user_agent:  navigator.userAgent,
        referrer:    document.referrer,
        timestamp:   new Date().toISOString(),
        page_url:    'window.location.href'
    };

    // fbc — primero cookie, luego construir con fbclid
    const fbcFromCookie = getFbcFromCookie();
    if (fbcFromCookie) {
        capturedData.fbc = fbcFromCookie;
        updateStatus('Datos de Facebook capturados desde cookie');
    } else if (capturedData.fbclid) {
        capturedData.fbc = 'fb.1.' + Date.now() + '.' + capturedData.fbclid;
        updateStatus('Datos de Facebook capturados correctamente');
    } else {
        updateStatus('Advertencia: No se detectó fbclid', true);
    }

    // ✅ fbp con delay para que el pixel tenga tiempo de setear la cookie _fbp
    setTimeout(function() {
        const fbpFromCookie = getFbpFromCookie();
        if (fbpFromCookie) {
            capturedData.fbp = fbpFromCookie;
        } else {
            capturedData.fbp = 'fb.1.' + Date.now() + '.' + Math.random().toString(36).substring(2, 15);
        }
        const fbcCookie = getFbcFromCookie();
        if (fbcCookie && !capturedData.fbc) capturedData.fbc = fbcCookie;
    }, 300);

    const sessionID = 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
    capturedData.session_id = sessionID;

    const mensajeEncoded = encodeURIComponent(CONFIG.mensaje + '\n\nID:' + sessionID);
    const whatsappURL    = 'https://wa.me/' + CONFIG.whatsappNumber + '?text=' + mensajeEncoded;
    manualLinkEl.href    = whatsappURL;

    if (CONFIG.scriptURL && CONFIG.scriptURL.includes('script.google.com')) {
        updateStatus('Guardando información de seguimiento...');
        fetch(CONFIG.scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(capturedData)
        })
        .then(() => {
            updateStatus('Información guardada. Redirigiendo...');
            // ✅ Evento Lead en el pixel con eventID para deduplicación
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Lead', {}, { eventID: sessionID });
            }
            setTimeout(() => window.location.href = whatsappURL, CONFIG.redirectDelay);
        })
        .catch(() => {
            updateStatus('Error al guardar. Redirigiendo igualmente...');
            setTimeout(() => window.location.href = whatsappURL, CONFIG.redirectDelay);
        });
    } else {
        updateStatus('Redirigiendo...');
        setTimeout(() => window.location.href = whatsappURL, CONFIG.redirectDelay);
    }

    setTimeout(() => {
        fallbackEl.style.display = 'block';
        updateStatus('¿No se abrió WhatsApp? Usa el botón de abajo');
    }, CONFIG.redirectDelay + 3000);
  </script>
</body>
</html>
